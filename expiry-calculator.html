<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expiry Date Calculator n</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      color: #2d3748;
      font-size: 26px;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #718096;
      font-size: 14px;
      text-align: center;
      margin-bottom: 28px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #4a5568;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin-top: 28px;
      padding: 20px;
      background: #f7fafc;
      border-radius: 12px;
      border-left: 4px solid #667eea;
      display: none;
    }

    .result.show {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }

    .date-row + .date-row {
      border-top: 1px solid #e2e8f0;
    }

    .date-label {
      color: #718096;
      font-size: 14px;
      font-weight: 500;
    }

    .date-value {
      color: #2d3748;
      font-size: 18px;
      font-weight: 700;
      font-family: "SF Mono", Monaco, Consolas, monospace;
    }

    .note {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fefcbf;
      color: #744210;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .note.show {
      display: block;
    }

    .error {
      margin-top: 14px;
      color: #c53030;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Expiry Date Calculator</h1>
    <p class="subtitle">Calculate start &amp; end dates, skipping weekends</p>

    <div class="input-group">
      <label for="daysInput">Days to Add</label>
      <input type="number" id="daysInput" min="0" value="7" placeholder="Enter number of days">
    </div>

    <button id="calcBtn">Calculate Dates</button>

    <div class="error" id="error">Please enter a valid non-negative number.</div>

    <div class="result" id="result">
      <div class="date-row">
        <span class="date-label">Start Date</span>
        <span class="date-value" id="startDate">—</span>
      </div>
      <div class="date-row">
        <span class="date-label">End Date</span>
        <span class="date-value" id="endDate">—</span>
      </div>
      <div class="note" id="note"></div>
    </div>
  </div>

  <script>
    function calculateExpiryDates(daysToAdd) {
      const startDate = new Date();

      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + daysToAdd);

      // Track whether we shifted for a weekend, for a friendly note in the UI
      let adjusted = null;
      const dayOfWeek = endDate.getDay();
      if (dayOfWeek === 6) {
        endDate.setDate(endDate.getDate() + 2);
        adjusted = 'Saturday';
      } else if (dayOfWeek === 0) {
        endDate.setDate(endDate.getDate() + 1);
        adjusted = 'Sunday';
      }

      return {
        startDate: formatDate(startDate),
        endDate: formatDate(endDate),
        adjusted: adjusted
      };
    }

    function formatDate(date) {
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const year = date.getFullYear();
      return `${month}/${day}/${year}`;
    }

    const daysInput = document.getElementById('daysInput');
    const calcBtn   = document.getElementById('calcBtn');
    const resultEl  = document.getElementById('result');
    const errorEl   = document.getElementById('error');
    const noteEl    = document.getElementById('note');

    function runCalculation() {
      const value = daysInput.value.trim();
      const days = Number(value);

      if (value === '' || isNaN(days) || days < 0 || !Number.isInteger(days)) {
        errorEl.classList.add('show');
        resultEl.classList.remove('show');
        return;
      }

      errorEl.classList.remove('show');

      const dates = calculateExpiryDates(days);
      document.getElementById('startDate').textContent = dates.startDate;
      document.getElementById('endDate').textContent   = dates.endDate;

      if (dates.adjusted) {
        noteEl.textContent = `End date originally fell on a ${dates.adjusted} — moved to the next Monday.`;
        noteEl.classList.add('show');
      } else {
        noteEl.classList.remove('show');
      }

      resultEl.classList.add('show');
    }

    calcBtn.addEventListener('click', runCalculation);
    daysInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runCalculation();
    });

    // Run once on load so the user sees an immediate result
    runCalculation();
  </script>
</body>
</html>
